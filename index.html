<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЬЫТ</title>
    <style>
        @font-face {
            font-family: 'xpfont';
            src: url('./xpfont.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { padding: 0; margin: 0; }
        * {
            font-family: 'xpfont';
            scrollbar-width: none;
            -ms-overflow-style: none;
            color: var(--black);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;    
            outline: none;
            }
            *::-webkit-scrollbar {
                display: none;
            }
        body {
            height: 100vh;
            background: linear-gradient(to bottom, #CEDAF0, #FDFDFD);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 15px;
        }
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            & img { height: 20px; }
        }
        span {
            background: white;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px;
            color: #244079;
            & img { height: 15px; }
        }
        .reg {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            & img { width: 100px; }

            & .block {
                width: 250px;
                display: flex;
                flex-direction: column;
                gap: 5px;
                & input { width: 100%; height: 25px; background: #E6ECF7; border: 1.25px solid #5C6F94; border-radius: 0; box-sizing: border-box; padding-left: 5px; padding-right: 5px; }
            }
            & .flexbutton {
                display: flex;
                justify-content: space-between;
                width: 100%;
                gap: 0;
                & button {
                    padding: 0;
                    flex: 1;
                    height: 25px;
                    border: 1.25px solid #5C6F94;
                    border-radius: 0; box-sizing: border-box;
                    display: flex; justify-content: center; align-items: center;
                    background: linear-gradient(to bottom, white 0%, white 50%, #D9E2F3 51%, white 100%);
                }
                .active { background: linear-gradient(to bottom, #fffadc 0%, #fffadc 50%, #fff1a1 51%, white 100%); }
            }
        }

        button {
            padding-left: 15px;
            padding-right: 15px;
            height: 25px;
            border: 1.25px solid #5C6F94;
            border-radius: 0; box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, white 0%, white 50%, #D9E2F3 51%, white 100%);
        }
        .active { background: linear-gradient(to bottom, #fffadc 0%, #fffadc 50%, #fff1a1 51%, white 100%); }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            33% { transform: rotate(-5deg); }
            66% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <header>
        <img src="ьыт.png" alt="ьыт">
    </header>
    <div class="reg">
        <img src="пользователь.png"alt="юзер">

        <div class="block">
            <p>кликуха в интернете</p>
            <input id="name" maxlength="20" minlength="3" type="text" placeholder="Ваше имя">
        </div>
        <div class="block">
            <p>кто вы?</p>
            <div class="flexbutton">
                <button id="interesting" class="active">Интересность :3</button>
                <button onclick="nonchange()">Нормис</button>
            </div>
        </div>
        <p style="color: red; display: none;" id="error">Не выделывайся, пиши!</p>
        <button onclick="reg(document.getElementById('name').value)" style="margin-top: 20px;">Регаться</button>
    </div>
    <span><img src="ьыт.png" alt="ьыт"> сервис общения</span>
    <script>
        function nonchange() {
            document.getElementById("interesting").style.animation = "none";
            setTimeout (() => {
                document.getElementById("interesting").style.animation = "rotate 0.5s ease";
            }, 100);
        };

        function reg(name) {
            if (!name) { document.getElementById("error").style.display = "block"; return };

            localStorage.setItem("nameyit", name);
            location.href = "main.html";
        };

        if (localStorage.getItem("nameyit")) location.href = "main.html";
    </script>
</body>
</html>
