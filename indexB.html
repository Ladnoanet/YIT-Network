<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЬЫТ</title>
    <style>
        * {
            padding: 0; margin: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            background: #000;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            width: 100%;
            padding: 0 15px;
            height: 10vh;
            display: flex;
            align-items: center;
        }
        .header h1 {
            font-size: 7vh;
            font-weight: 400;
            letter-spacing: -1px;
        }

        .mainsrc {
            flex: 1;
            padding: 10px 20px 30px;
            display: flex;
            flex-direction: column;
        }
        .mainsrc h1 {
            font-size: 35px;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .mainsrc h2 {
            font-size: 15px;
            font-weight: 400;
            color: #807F84;
            margin-bottom: 28px;
        }

        .reg {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .reg .icon {
            width: 72px;
            height: 72px;
            background: #1F1F1F;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .reg .icon svg { width: 40px; height: 40px; fill: #807F84; }
        .reg p { font-size: 16px; color: #807F84; }
        .reg span { font-size: 13px; color: #555; display: block; margin-top: 4px; }

        .block {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .block > p {
            font-size: 14px;
            color: #807F84;
        }
        .block input {
            width: 100%;
            height: 44px;
            background: #1F1F1F;
            border: none;
            color: white;
            font-size: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 0 10px;
            transition: border-color 0.2s;
            -webkit-user-select: text;
            user-select: text;
        }
        .block input::placeholder { color: #555; }

        .flexbutton {
            display: flex;
            gap: 0;
        }
        .flexbutton button {
            flex: 1;
            height: 44px;
            background: #1F1F1F;
            border: none;
            border-right: 1px solid #000;
            color: #807F84;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            -webkit-user-select: none;
            user-select: none;
        }
        .flexbutton button:last-child { border-right: none; }
        .flexbutton button.active {
            background: var(--accent, #19A4E9);
            color: white;
        }

        #error {
            display: none;
            font-size: 14px;
            color: #E51400;
            margin-bottom: 16px;
            margin-top: -8px;
        }

        button.border {
            width: 100%;
            height: 48px;
            background: none;
            border: 1.5px solid white;
            color: white;
            font-size: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            -webkit-user-select: none;
            user-select: none;
            margin-top: 16px;
        }
        button.border:active { background: white; color: black; }

        .footer {
            padding: 12px 20px;
            border-top: 1px solid #1F1F1F;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer span { font-size: 13px; color: #555; }
        .footer strong { font-size: 13px; color: #807F84; font-weight: 400; }

        @keyframes rotate {
            0%   { transform: rotate(0deg); }
            33%  { transform: rotate(-5deg); }
            66%  { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ЬЫТ</h1>
    </div>

    <div class="mainsrc">
        <h1>вход</h1>
        <h2>создай себе кликуху</h2>

        <div class="reg">
            <div class="icon" id="avatarBox">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <div>
                <p id="namePreview">твоё имя тут</p>
                <span id="rolePreview">Интересность :3</span>
            </div>
        </div>

        <div class="block">
            <p>кликуха в интернете</p>
            <input id="name" maxlength="20" minlength="3" type="text" placeholder="Начеркай что нить" autocomplete="off" oninput="updatePreview()">
        </div>

        <div class="block">
            <p>кто вы?</p>
            <div class="flexbutton">
                <button id="interesting" class="active">Интересность :3</button>
                <button onclick="nonchange()">Нормис</button>
            </div>
        </div>

        <p style="color: #E51400; display: none;" id="error">Не выделывайся, пиши!</p>

        <button class="border" onclick="reg(document.getElementById('name').value)">Регаться</button>
    </div>

    <div class="footer">
        <strong>ЬЫТ</strong>
        <span>сервис общения</span>
    </div>

    <script>
        const accent = localStorage.getItem('BrickTheme') || '#19A4E9';
        document.documentElement.style.setProperty('--accent', accent);
        document.getElementById('interesting').style.background = accent;
        document.getElementById('interesting').style.color = 'white';

        function nonchange() {
            document.getElementById("interesting").style.animation = "none";
            setTimeout(() => {
                document.getElementById("interesting").style.animation = "rotate 0.5s ease";
            }, 100);
        };

        function updatePreview() {
            const val = document.getElementById('name').value;
            document.getElementById('namePreview').textContent = val || 'твоё имя тут';
        };

        function reg(name) {
            if (!name) { document.getElementById("error").style.display = "block"; return };
            localStorage.setItem("nameyit", name);
            location.href = "mainB.html";
        };

        if (localStorage.getItem("nameyit")) location.href = "mainB.html";
    </script>
</body>
</html>
