<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЬЫТ</title>
    <style>
        * {
            padding: 0; margin: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            background: #000;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            width: 100%;
            padding: 0 15px;
            height: 10vh;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 7vh;
            font-weight: 400;
            letter-spacing: -1px;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        main h1 {
            font-size: 35px;
            font-weight: 400;
        }

        /* WRITE POST */
        .writepost {
            display: flex;
            gap: 12px;
        }
        .writepost .user {
            width: 56px;
            height: 56px;
            background: #1F1F1F;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .writepost .user svg {
            width: 34px;
            fill: #807F84;
        }
        .writepostblock {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        textarea {
            width: 100%;
            min-height: 70px;
            max-height: 100px;
            resize: vertical;
            background: #1F1F1F;
            border: none;
            color: white;
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 8px 10px;
            transition: border-color 0.2s;
            -webkit-user-select: text;
            user-select: text;
        }
        textarea::placeholder { color: #555; }

        #sayBtn {
            align-self: flex-start;
            height: 36px;
            padding: 0 18px;
            background: none;
            border: 1.5px solid white;
            color: white;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            -webkit-user-select: none;
            user-select: none;
        }
        #sayBtn:active { background: white; color: black; }
        #sayBtn:disabled { border-color: #555; color: #555; cursor: default; }

        /* POSTS */
        .posts {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .post {
            width: 100%;
            padding: 10px 12px;
            background: #1F1F1F;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .post .nameautor {
            font-size: 13px;
            color: var(--accent, #19A4E9);
        }
        .post .posttext {
            font-size: 16px;
            color: white;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Писанина</h1>
    </div>

    <main>
        <div class="writepost">
            <div class="user">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
            <div class="writepostblock">
                <textarea placeholder="Мне нравится..." id="postarea"></textarea>
                <button id="sayBtn">Сказать!</button>
            </div>
        </div>

        <h1>Постс</h1>
        <div class="posts"></div>
    </main>

    <script>
        const accent = localStorage.getItem('BrickTheme') || '#19A4E9';
        document.documentElement.style.setProperty('--accent', accent);
    </script>
    <script src="block.js"></script>
    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

        const nameofuser = atob(atob("YUhSMGNITTZMeTlzYzJ0cmIyVjZhV2wyZVdKalpHZHlhM051WkM1emRYQmhZbUZ6WlM1amJ3PT0="));
        const IDPost = atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW14emEydHZaWHBwYVhaNVltTmtaM0pyYzI1a0lpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpJd09UY3hPRGNzSW1WNGNDSTZNakE0TnpZM016RTROMzAuRVRmMVlTOXdhbVRscDNlRU5WN19BWTg4a2ZyUEw4U0dRVFdMSzc5T3c3QQ==");

        const baseYIT = createClient(nameofuser, IDPost);

        let isSending = false;

        const phrases = {
            1: "Мне нравится...",
            2: "Хочу рассказать про...",
            3: "Чувствую вайб...",
            4: "Что думаете о...",
            5: "Вы знали, что я...",
            6: "Я хочу...",
            7: "Я поделюсь о...",
            8: "Что насчет...",
            9: "Как вам идея о...",
            10: "Сегодня я думаю о…"
        };

        function newphrase() {
            const phrasesKeys = Object.keys(phrases);
            const phrase = phrases[phrasesKeys[Math.floor(Math.random() * phrasesKeys.length)]];
            document.getElementById("postarea").placeholder = phrase;
        }

        newphrase();

        async function loadPosts() {
            const { data, error } = await baseYIT
                .from('yitposts')
                .select('*')
                .order('id', { ascending: false });

            const postsContainer = document.querySelector('.posts');
            postsContainer.innerHTML = '';

            if (error) {
                console.error('Ошибка загрузки постов:', error);
                return;
            }

            data.forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.classList.add('post');

                const nameP = document.createElement('p');
                nameP.classList.add('nameautor');
                nameP.textContent = post.autor;

                const postP = document.createElement('p');
                postP.classList.add('posttext');
                postP.textContent = post.post;

                postDiv.appendChild(nameP);
                postDiv.appendChild(postP);

                postsContainer.appendChild(postDiv);
            });
        }

        loadPosts();

        async function addPost() {
            if (isSending) return;

            const btn = document.getElementById('sayBtn');
            const postText = document.getElementById('postarea').value.trim();

            if (!postText) return alert("Пожалуйста, введите текст поста!");

            const authorName = localStorage.getItem("nameyit") || "Аноним";

            if (hasProfanity(postText) == false) {

                isSending = true;
                btn.textContent = "Говорю...";
                btn.disabled = true;

                const { data, error } = await baseYIT
                    .from('yitposts')
                    .insert([{ post: postText, autor: authorName }]);

                if (error) {
                    console.error('Ошибка публикации:', error);
                    alert("Не удалось опубликовать пост.");

                    isSending = false;
                    btn.textContent = "Сказать!";
                    btn.disabled = false;
                    return;
                }

                document.getElementById('postarea').value = '';
                newphrase();
                await loadPosts();

                isSending = false;
                btn.textContent = "Сказать!";
                btn.disabled = false;

            } else {
                alert("Общайтесь цензурно!");
            }
        }

        document.getElementById('sayBtn').addEventListener('click', addPost);

        if (localStorage.getItem("nameyit")) {
            if (isblocked(localStorage.getItem("nameyit"))) {
                location.href = "blockedB.html";
            }
        } else { location.href = "blockedB.html"; }

    </script>
</body>
</html>
