<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЬЫТ</title>
    <style>
        * {
            padding: 0; margin: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            background: #000;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            width: 100%;
            padding: 0 15px;
            height: 10vh;
            display: flex;
            align-items: center;
        }
        .header h1 {
            font-size: 7vh;
            font-weight: 400;
            letter-spacing: -1px;
        }

        .content {
            flex: 1;
            padding: 20px 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .content h1 {
            font-size: 35px;
            font-weight: 400;
            color: var(--accent, #19A4E9);
        }

        .avatar-box {
            width: 72px;
            height: 72px;
            background: #1F1F1F;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-box svg {
            width: 40px;
            height: 40px;
            fill: #555;
        }

        .blocked-text {
            font-size: 20px;
            font-weight: 400;
            line-height: 1.4;
            color: white;
        }

        .blocked-sub {
            font-size: 15px;
            color: #807F84;
            line-height: 1.5;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: #1F1F1F;
        }

        .footer {
            padding: 12px 20px;
            border-top: 1px solid #1F1F1F;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer strong { font-size: 13px; color: #807F84; font-weight: 400; }
        .footer span { font-size: 13px; color: #555; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ЬЫТ</h1>
    </div>

    <div class="content">
        <div class="avatar-box">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
        </div>

        <h1>заблокировано</h1>

        <p class="blocked-text">Вы заблокированы структурой цензуры и модерации ЛК-Медиа</p>

        <div class="divider"></div>

        <p class="blocked-sub">Если вы считаете это ошибкой - мне похуй</p>
    </div>

    <div class="footer">
        <strong>ЬЫТ</strong>
        <span>сервис общения</span>
    </div>

    <script>
        const accent = localStorage.getItem('BrickTheme') || '#19A4E9';
        document.documentElement.style.setProperty('--accent', accent);
    </script>
</body>
</html>
