<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        button, a { cursor: pointer; }

        @font-face {
            font-family: 'xpfont';
            src: url('./xpfont.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * {
            font-family: 'xpfont';
            scrollbar-width: none;
            -ms-overflow-style: none;
            color: var(--black);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;    
            outline: none;
            transition: all 0.2s;
            }
            *::-webkit-scrollbar {
                display: none;
            }

        :root {
            --none: #000000;
            --black: #000000;
            --white: #ffffff;
            --whiteblur: #3d549e40;
            --whitefifty: rgba(255, 255, 255, 0.2);
            --whiteseventy: rgba(255, 255, 255, 0.8);
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --maxbord: 20px;
            --okbord: 15px;
            --minbord: 7.5px;
            --button-of-panel: rgba(255, 255, 255, 0.9);
            --blackest-gad: rgb(36, 36, 36);
            --gdone: #C6A0FF; --gdtwo: #fff4a0; --gdthree: #a0ffb8;
            --other-white: #EFF4F9;
            --invert: none;
            --accent-color: #0078D4;
            --grey: rgb(222, 222, 222);
            --window-main: rgb(255, 255, 255);
            --greyborder: #858585;
        }

        body {
            color: var(--black);
            display: flex;
            flex-direction: column;
            font-family: var(--font);
            height: 100vh;
        }

        header {
            top: 0;
            position: fixed;
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: left;
            box-sizing: border-box;
            padding-left: 15px;
            padding-right: 15px;
            gap: 15px;
            background: 0;

            & span {
                display: flex;
                align-items: center;
                gap: 5px;

                & img {
                    height: 25px;
                }
            }
        }

        .main {
            background: white;
            height: calc(100vh - 40px);
            width: 100%;
            overflow-y: hidden;
            position: fixed;
            bottom: 0;
        }

        .mainmain {
            background: #7598E3;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 25px;
            & p { font-size: 40px; color: white; align-self: flex-start; font-weight: 600; }
            & img { height: 200px; align-self: flex-end; margin-top: auto; opacity: 0.5; }
        }

        hr { border: 1px solid var(--grey); }
    </style>
</head>
<body data-theme="white">
    <header>
        <span>ЬЫТ Инлук</span>
    </header>

    <div class="main">
        <div id="main" class="mainmain">
            <p>Зарегайся в ьыт!</p>
            <img src="пользователь.png" alt="пользователь">
        </div>

    </div>

    <script>
        
        function hideAll() {
            document.getElementById('main').style.display = 'none';
        }

        function showMain() {
            hideAll();
            document.getElementById('main').style.display = 'flex';
        }

        showMain();
    </script>
</body>
</html>
